ation:`parallel-work`,edgeIds:[`e14-sandbox`,`e14-external`],join:`action-event`},{id:`action-event`,nodeId:`action`,label:E(`汇合并标准化结果`,`Merge & Normalize Results`),relation:`module`,edgeIds:[`e15`],next:`observation-event`},{id:`observation-event`,nodeId:`observation`,label:E(`评估执行结果`,`Evaluate Result`),relation:`decision`,edgeIds:[`e16`,`e18`,`e19`],choices:{finish:{label:E(`通过并回传`,`Accept & Return`),next:`llm-join-event`,relation:`callback`,completeLane:`tools`,nextByPendingLane:{rag:`rag-route`}},retry:{label:E(`重试工具`,`Retry Tool`),next:`tool-event`,relation:`retry`,resetParallelWork:!0},replan:{label:E(`回到规划`,`Replan`),next:`planning-event`,relation:`replan`}}},{id:`llm-join-event`,nodeId:`llm`,label:E(`汇合上下文与观察结果`,`Join Context and Observation`),relation:`sequence`,edgeIds:[`e17`],next:`final-event`},{id:`final-event`,nodeId:`final-response`,label:E(`生成最终响应`,`Generate Final Response`),relation:`sequence`,next:null}]},O=(e,t)=>({zh:e,en:t}),k=(e,t,n,r,i,a)=>({now:O(e,t),reason:O(n,r),result:O(i,a)}),re={"input-event":k(`读取用户目标、约束条件、附件和当前会话上下文。`,`Read the user goal, constraints, attachments, and current conversation context.`,`自然语言请求通常不够结构化，Agent 需要先确认任务边界和可用信息。`,`Natural-language requests are often unstructured, so the Agent first establishes scope and available information.`,`形成包含目标、限制和上下文的标准化任务对象。`,`Produce a normalized task object containing the goal, constraints, and context.`),"orchestrator-event":k(`创建本次运行状态，并登记模型、记忆、检索和工具能力。`,`Create the run state and register model, memory, retrieval, and tool capabilities.`,`后续步骤需要共享同一份执行状态，才能协调并行任务、回传结果和异常恢复。`,`Later stages need one shared execution state to coordinate parallel work, callbacks, and recovery.`,`生成可被后续模块共同使用的执行上下文和调度入口。`,`Produce the execution context and scheduling entry point shared by downstream modules.`),"planning-event":k(`并行拆解任务目标，同时读取与当前任务相关的记忆。`,`Decompose the task while retrieving memory relevant to the current request in parallel.`,`计划决定要做哪些动作，记忆补充已有事实和历史偏好，两者互不依赖且可以同时运行。`,`Planning defines required actions while memory supplies known facts and preferences; both can run independently.`,`得到带依赖顺序的执行计划，以及可注入推理上下文的相关记忆。`,`Produce an ordered execution plan and relevant memory ready for reasoning context.`),"llm-dispatch-event":k(`判断当前任务缺少外部知识、需要执行动作，还是两者都需要。`,`Determine whether the task needs external knowledge, real-world action, or both.`,`知识缺口应进入 RAG，系统操作应进入工具；相互独立时并行可以减少等待时间。`,`Knowledge gaps belong in RAG, system operations belong in tools, and independent lanes can run in parallel.`,`形成仅检索、仅工具或检索与工具并行的主泳道策略。`,`Produce a RAG-only, tools-only, or parallel RAG-and-tools lane strategy.`),"rag-route":k(`检查任务需要补充的知识类型、数据来源和时效性。`,`Inspect the knowledge type, source, and freshness required by the task.`,`内部知识适合向量或数据库检索，实时信息需要联网搜索；两类信息都需要时应双路并行。`,`Internal knowledge fits vector or database retrieval, while current information requires web search; both can run together.`,`形成向量检索、联网搜索或双路并行的检索策略。`,`Produce a vector-only, web-only, or dual-branch retrieval strategy.`),"rag-retrieval":k(`按照已选策略同时执行语义检索、关键词查询、数据库查询或联网搜索。`,`Run semantic retrieval, keyword lookup, database search, or web search according to the selected strategy.`,`不同检索方式覆盖不同信息空间，并行执行可以提高召回率并避免单一来源偏差。`,`Different methods cover different information spaces; parallel retrieval improves recall and reduces single-source bias.`,`每条分支返回带来源和相关度的候选结果集合。`,`Each branch returns candidate results with provenance and relevance signals.`),"rag-join":k(`收集各检索分支返回的候选结果，并等待已启动分支全部结束。`,`Collect candidate results and wait for every active retrieval branch to finish.`,`同一事实可能被多条路径命中，直接使用会造成重复、冲突和上下文浪费。`,`The same fact may appear in several branches, creating duplicates, conflicts, and wasted context.`,`得到去重后的统一候选集，交给相关性重排。`,`Produce one deduplicated candidate set ready for relevance reranking.`),"rag-context-event":k(`对候选资料重排、截取有效片段，并连同来源组装为增强上下文。`,`Rerank candidates, extract useful passages, and assemble them with sources into augmented context.`,`模型的上下文窗口有限，只应注入最相关、可追溯且不会互相冲突的信息。`,`The model context window is limited, so only relevant, traceable, and non-conflicting evidence should be injected.`,`生成包含关键片段、来源和引用关系的上下文包。`,`Produce a context package containing key passages, sources, and citation links.`),"rag-callback":k(`把组装好的增强上下文回传给大语言模型，并标记 RAG 泳道完成。`,`Return the assembled context to the LLM and mark the RAG lane complete.`,`检索结果只有进入模型当前推理上下文后，才能影响后续判断和最终回答。`,`Retrieved evidence can influence reasoning and the final answer only after it enters the model context.`,`大语言模型获得可引用的外部证据，并继续等待或汇合其他泳道。`,`The LLM receives citable evidence and waits for or joins the remaining lane results.`),"tool-select-event":k(`根据动作类型、权限、风险和依赖关系选择代码沙箱、外部系统或双路并行。`,`Choose the code sandbox, an external system, or both based on action type, permissions, risk, and dependencies.`,`计算任务适合隔离沙箱，业务读写需要外部系统；无依赖的动作可以同时执行。`,`Computation belongs in an isolated sandbox, business operations need external systems, and independent actions can run together.`,`形成明确的工具执行清单、参数范围和并行方式。`,`Produce an explicit tool execution list, parameter scope, and concurrency mode.`),"tool-event":k(`校验工具参数与权限后，在选定环境中执行一个或多个工具调用。`,`Validate tool arguments and permissions, then execute one or more calls in the selected environments.`,`工具会产生真实计算结果或外部副作用，因此必须隔离执行、记录调用并支持失败恢复。`,`Tools produce real computation or external side effects, so calls must be isolated, logged, and recoverable.`,`每个工具分支返回状态、原始结果、错误信息和审计记录。`,`Each tool branch returns status, raw output, errors, and an audit record.`),"action-event":k(`汇合工具分支，并把不同格式的返回值转换成统一结果结构。`,`Join tool branches and convert their different return formats into one normalized result structure.`,`外部系统和沙箱的字段、错误格式与完成时间不同，不能直接交给后续评估。`,`Sandbox and external-system responses differ in fields, error formats, and timing, so they need normalization before evaluation.`,`生成包含成功状态、数据、错误和来源的标准化动作结果。`,`Produce a normalized action result containing status, data, errors, and provenance.`),"observation-event":k(`检查动作结果是否满足目标、是否完整，以及是否触发安全或质量问题。`,`Check whether the action result meets the goal, is complete, and raises any safety or quality concerns.`,`成功结果可以回传模型；暂时性错误适合重试；目标或计划错误则需要重新规划。`,`Successful output can return to the model, transient errors can retry, and goal or plan errors require replanning.`,`形成通过回传、重试工具或回到规划三种评估结论之一。`,`Produce one evaluation outcome: accept and return, retry the tool, or replan.`),"llm-join-event":k(`汇合规划、记忆、检索上下文和工具观察结果，检查所需信息是否齐备。`,`Join planning, memory, retrieved context, and tool observations, then check whether required information is complete.`,`最终生成前必须消除泳道间的冲突，并区分事实证据、工具结果和模型推断。`,`Before generation, the Agent must resolve lane conflicts and distinguish evidence, tool results, and model inference.`,`形成结构完整、来源明确且可用于回答的最终上下文。`,`Produce a complete, source-aware final context ready for response generation.`),"final-event":k(`根据最终上下文组织答案、引用依据，并检查格式和安全要求。`,`Compose the answer from the final context, attach supporting sources, and check formatting and safety requirements.`,`用户需要的是清晰可用的结果，而不是内部计划、检索片段和工具原始日志。`,`The user needs a clear usable result rather than internal plans, retrieved fragments, or raw tool logs.`,`输出面向用户的最终响应，并结束本轮执行。`,`Deliver the user-facing final response and complete the run.`)},ie={"user-task":O(`承载用户目标、限制条件、附件和会话背景，是整个 Agent 流程的输入边界。`,`Holds the user goal, constraints, attachments, and conversation background as the input boundary of the Agent flow.`),orchestrator:O(`维护运行状态、安排执行顺序，并协调模型、记忆、检索、工具和异常恢复。`,`Maintains run state, schedules execution, and coordinates the model, memory, retrieval, tools, and recovery.`),llm:O(`理解任务、综合上下文、选择执行策略，并把不同模块的结果组织成决策或回答。`,`Interprets the task, combines context, selects execution strategy, and turns module outputs into decisions or answers.`),planning:O(`把目标拆成可执行子任务，识别依赖顺序，并在执行前后检查计划是否仍然有效。`,`Breaks goals into executable tasks, identifies dependencies, and validates the plan before and after execution.`),memory:O(`保存并读取当前会话状态、历史事实和用户偏好，为规划与行动提供连续上下文。`,`Stores and retrieves session state, historical facts, and user preferences to provide continuity for planning and action.`),"rag-route":O(`根据知识位置和时
